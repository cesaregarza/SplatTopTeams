name: Verify and Publish Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".version"
      - ".github/workflows/verify_and_publish_images.yaml"
      - "dockerfiles/**"
      - "frontend/**"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
      - "tests/**"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".version"
      - ".github/workflows/verify_and_publish_images.yaml"
      - "dockerfiles/**"
      - "frontend/**"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
      - "tests/**"
      - "uv.lock"

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: teams-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run backend tests
        run: uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  publish:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: default
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read release version
        id: version
        run: |
          version="$(tr -d '[:space:]' < .version)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Expected .version to contain semver, got: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch registry credentials
        id: broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          capability: digitalocean-registry-write

      - name: Set up DOCR Buildx
        uses: cesaregarza/.github/actions/setup-docr-buildx@main
        with:
          digitalocean-access-token: ${{ fromJson(steps.broker.outputs.secrets-json).DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push teams API image
        id: api
        uses: cesaregarza/.github/actions/build-docr-image@main
        with:
          context: .
          file: dockerfiles/dockerfile.api
          tags: |
            registry.digitalocean.com/sendouq/teams-api:latest
            registry.digitalocean.com/sendouq/teams-api:v${{ steps.version.outputs.value }}

      - name: Build and push teams frontend image
        id: frontend
        uses: cesaregarza/.github/actions/build-docr-image@main
        with:
          context: .
          file: dockerfiles/dockerfile.frontend
          tags: |
            registry.digitalocean.com/sendouq/teams-frontend:latest
            registry.digitalocean.com/sendouq/teams-frontend:v${{ steps.version.outputs.value }}

      - name: Publish operator summary
        run: |
          {
            echo "## Published images"
            echo
            echo "- teams-api: \`registry.digitalocean.com/sendouq/teams-api:v${{ steps.version.outputs.value }}\`"
            echo "- teams-frontend: \`registry.digitalocean.com/sendouq/teams-frontend:v${{ steps.version.outputs.value }}\`"
            echo
            echo "## Digests"
            echo
            echo "- teams-api: \`${{ steps.api.outputs.digest }}\`"
            echo "- teams-frontend: \`${{ steps.frontend.outputs.digest }}\`"
            echo
            echo "Update \`SplatTopConfig/helm/splattop-teams/values-prod.yaml\` with the new tags, merge that repo, then sync \`splattop-teams-prod\` in Argo."
          } >> "$GITHUB_STEP_SUMMARY"
